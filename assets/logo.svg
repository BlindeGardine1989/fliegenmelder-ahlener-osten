<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Fliegenmelder Ahlener Osten Logo">
  <defs>
    <linearGradient id="green" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6fb042"/>
      <stop offset="1" stop-color="#2f8128"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="#ffffff"/>

  <!-- Grüner offener Kreis -->
  <path d="M250 690
           A420 420 0 1 1 950 690"
        fill="none"
        stroke="#2f8128"
        stroke-width="22"
        stroke-linecap="round"/>

  <!-- Flügel -->
  <ellipse cx="455" cy="430" rx="78" ry="210"
           fill="#ffffff"
           stroke="#101611"
           stroke-width="12"
           transform="rotate(-25 455 430)"/>
  <ellipse cx="745" cy="430" rx="78" ry="210"
           fill="#ffffff"
           stroke="#101611"
           stroke-width="12"
           transform="rotate(25 745 430)"/>

  <!-- Flügeladern -->
  <path d="M432 292 L560 610 M505 340 L468 560 M390 450 L535 500"
        fill="none" stroke="#101611" stroke-width="7" stroke-linecap="round" opacity="0.75"/>
  <path d="M768 292 L640 610 M695 340 L732 560 M810 450 L665 500"
        fill="none" stroke="#101611" stroke-width="7" stroke-linecap="round" opacity="0.75"/>

  <!-- Körper -->
  <ellipse cx="600" cy="445" rx="76" ry="210" fill="#101611"/>
  <ellipse cx="600" cy="250" rx="82" ry="74" fill="#101611"/>

  <!-- Körperlinien -->
  <path d="M545 420 C575 445 625 445 655 420"
        fill="none" stroke="#4a554a" stroke-width="8" opacity="0.65"/>
  <path d="M542 530 C575 560 625 560 658 530"
        fill="none" stroke="#4a554a" stroke-width="8" opacity="0.65"/>

  <!-- Augen -->
  <ellipse cx="555" cy="220" rx="30" ry="45" fill="url(#green)"/>
  <ellipse cx="645" cy="220" rx="30" ry="45" fill="url(#green)"/>
  <path d="M546 202 C560 186 580 190 584 215"
        fill="none" stroke="#ffffff" stroke-width="5" opacity="0.7"/>
  <path d="M636 202 C650 186 670 190 674 215"
        fill="none" stroke="#ffffff" stroke-width="5" opacity="0.7"/>

  <!-- Fühler -->
  <path d="M560 175 L505 85 M640 175 L695 85"
        fill="none" stroke="#101611" stroke-width="12" stroke-linecap="round"/>

  <!-- Beine -->
  <path d="M530 335 L390 290 M670 335 L810 290
           M520 430 L360 495 M680 430 L840 495
           M555 620 L505 735 M645 620 L695 735"
        fill="none" stroke="#101611" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Standort-Pin -->
  <path d="M600 720
           C560 680 555 625 600 600
           C645 625 640 680 600 720Z"
        fill="url(#green)"/>
  <circle cx="600" cy="645" r="22" fill="#ffffff"/>

  <!-- Schrift -->
  <text x="600" y="865"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="128"
        font-weight="900"
        letter-spacing="2"
        fill="#101611">FLIEGENMELDER</text>

  <line x1="150" y1="950" x2="285" y2="950"
        stroke="#2f8128" stroke-width="10" stroke-linecap="round"/>
  <line x1="915" y1="950" x2="1050" y2="950"
        stroke="#2f8128" stroke-width="10" stroke-linecap="round"/>

  <text x="600" y="982"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="82"
        font-weight="800"
        letter-spacing="15"
        fill="#2f8128">AHLENER OSTEN</text>

  <line x1="330" y1="1035" x2="870" y2="1035"
        stroke="#2f8128" stroke-width="4" stroke-linecap="round"/>

  <text x="600" y="1110"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="42"
        font-weight="700"
        letter-spacing="13"
        fill="#101611">GEMEINSAM GEGEN DIE FLIEGENPLAGE</text>
</svg>
